# Run with: docker compose up -d

version: "3.9"

services:

  # Nginx reverse proxy — routes incoming HTTP/HTTPS traffic to backend services on the VPS
  nginx:
    image: nginx:latest
    container_name: reverse-proxy

    ports:
      - "80:80"   # HTTP traffic
      - "443:443" # HTTPS traffic

    volumes:
      # Nginx config mounted as read-only
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Cloudflare SSL certificates for HTTPS termination
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare

    networks:
      - web-network # Shared external network so Nginx can reach other services

# External Docker network shared across compose projects on this VPS
networks:
  web-network:
    external: true