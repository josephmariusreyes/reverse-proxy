# Run with: docker compose -f docker-compose.dev.yml up -d

version: "3.9"

services:

  # Nginx acts as a reverse proxy, routing incoming HTTP traffic to backend services
  nginx:
    image: nginx:latest
    container_name: reverse-proxy

    ports:
      - "80:80" # Expose port 80 on the host, mapped to port 80 inside the container

    volumes:
      # Mount the dev Nginx config into the container as read-only
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro

    networks:
      - web-network # Attach to the shared external network so Nginx can reach other services

# Use a pre-existing external Docker network shared across multiple compose projects
networks:
  web-network:
    external: true